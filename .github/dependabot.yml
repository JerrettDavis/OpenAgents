version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-all:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: "/apps/orchestrator-api"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-all:
        patterns:
          - "*"
