name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'DEVELOPMENT.md'

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Markdown format check
        run: pnpm format:check

      - name: Validate docs files exist
        run: |
          test -f docs/docfx.json
          test -f docs/toc.yml
          test -f docs/guides/quickstart-ui.md
          test -f docs/developer/overview.md
