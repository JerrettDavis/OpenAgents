name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: API tests
        run: dotnet test apps/orchestrator-api/OpenAgents.OrchestratorApi.csproj -v minimal

      - name: API coverage
        run: pnpm test:coverage:api

      - name: Web type-check
        run: pnpm --filter orchestrator-web type-check

      - name: Web build
        run: pnpm --filter orchestrator-web build

      - name: Install Playwright browser
        run: pnpm --filter orchestrator-web exec playwright install --with-deps chromium

      - name: Web e2e
        run: pnpm --filter orchestrator-web e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/orchestrator-web/playwright-report
            apps/orchestrator-web/test-results
          if-no-files-found: ignore

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/orchestrator-api/TestResults
          if-no-files-found: ignore
