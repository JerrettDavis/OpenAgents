provider:
  id: gemini
  name: Gemini
  version: "0.37.1"
  support_level: supported
  description: >
    Adapter for the Google Gemini CLI. Runs `gemini --prompt` in headless mode
    with stream-json output for OpenAgents orchestration.

  image:
    ref: openagents/provider-gemini:latest
    base: base-agent

  capabilities:
    supports_task_loop: true
    supports_structured_logs: true
    supports_token_metrics: false
    supports_cache_metrics: false
    supports_dynamic_model_switching: true
    supports_mailbox_notifications: false
    supports_subagents: false
    supports_agent_dashboard: false

  auth:
    strategy: env
    required_env:
      - GEMINI_API_KEY
    passthrough_env:
      - GEMINI_API_KEY

  launch:
    entrypoint: /usr/local/bin/entrypoint.sh
    default_args:
      - "--prompt"
      - "<task>"
      - "--yolo"
      - "--output-format"
      - "stream-json"

  parsing:
    log_format: stream-json

  metrics:
    extraction_strategy: none
